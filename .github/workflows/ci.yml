name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck-test:
    name: Lint, typecheck, test (packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - name: Validate every content pack (schema, cross-refs, §10.1 volume targets)
        run: |
          for pack in packs/*/; do
            id="$(basename "$pack")"
            echo "::group::Validate $id"
            pnpm --filter @polyglotai/language-pack-sdk run validate "../../packs/$id"
            echo "::endgroup::"
          done

  rust-tests:
    name: Rust migration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libgtk-3-dev patchelf
      - name: cargo test
        working-directory: apps/desktop-tauri/src-tauri
        run: cargo test

  build-desktop:
    name: Build desktop app (${{ matrix.os }})
    needs: [lint-typecheck-test, rust-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: ubuntu
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri system deps
        if: matrix.platform == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libgtk-3-dev patchelf
      - run: pnpm install --frozen-lockfile
      - name: Build Tauri app
        run: pnpm --filter @polyglotai/desktop-tauri tauri build
        env:
          # Public by necessity (baked into a client-side bundle) — the proxy itself holds the
          # real OpenAI key server-side, so this URL alone grants no access to anything.
          VITE_AI_PROXY_URL: https://qddglfcuipmazrjoxpin.supabase.co/functions/v1/openai-proxy
