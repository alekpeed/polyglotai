name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck-test:
    name: Lint, typecheck, test (packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - name: Validate pt-br pack (schema, cross-refs, §10.1 volume targets)
        run: pnpm --filter @polyglotai/language-pack-sdk run validate ../../packs/pt-br
      - name: Validate ja pack (schema, cross-refs, §10.1 volume targets)
        run: pnpm --filter @polyglotai/language-pack-sdk run validate ../../packs/ja
      - name: Validate ja-goshuin pack (schema, cross-refs, §10.1 volume targets)
        run: pnpm --filter @polyglotai/language-pack-sdk run validate ../../packs/ja-goshuin

  rust-tests:
    name: Rust migration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libgtk-3-dev patchelf
      - name: cargo test
        working-directory: apps/desktop-tauri/src-tauri
        run: cargo test

  build-desktop:
    name: Build desktop app (${{ matrix.os }})
    needs: [lint-typecheck-test, rust-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: ubuntu
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri system deps
        if: matrix.platform == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libgtk-3-dev patchelf
      - run: pnpm install --frozen-lockfile
      - name: Build Tauri app
        run: pnpm --filter @polyglotai/desktop-tauri tauri build
