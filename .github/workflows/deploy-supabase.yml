name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - "supabase/**"

jobs:
  deploy:
    name: Push schema + deploy edge function
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: qddglfcuipmazrjoxpin
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
      - name: Push schema migrations
        run: supabase db push
      - name: Deploy openai-proxy edge function
        run: supabase functions deploy openai-proxy --no-verify-jwt
