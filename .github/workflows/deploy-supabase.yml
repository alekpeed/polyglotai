name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - "supabase/**"
  workflow_dispatch: {}

jobs:
  deploy:
    name: Push schema + deploy edge function
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: qddglfcuipmazrjoxpin
      ACCESS_PASSCODE: ${{ secrets.ACCESS_PASSCODE }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
      - name: Push schema migrations
        run: supabase db push
      - name: Set access passcode secret
        # Only runs once the ACCESS_PASSCODE repo secret exists — no-op (and no risk of
        # accidentally clearing the gate) until then.
        if: env.ACCESS_PASSCODE != ''
        run: supabase secrets set ACCESS_PASSCODE="$ACCESS_PASSCODE"
      - name: Deploy openai-proxy edge function
        run: supabase functions deploy openai-proxy --no-verify-jwt
