name: Build Android APK

# Builds the native Android app into a debug APK and publishes it as a downloadable
# build artifact. Runs on pushes that touch the app or the packs, and can be run
# manually from the Actions tab. Uses only first-party actions + the runner's
# preinstalled Android SDK (no third-party actions).

on:
  workflow_dispatch:
  push:
    branches:
      - claude/polyglotai-language-packs-phgizp
    paths:
      - "apps/android-native/**"
      - "packs/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Ensure Android SDK packages
        run: |
          set -eu
          : "${ANDROID_SDK_ROOT:=${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          SDKMGR="$(find "$ANDROID_SDK_ROOT/cmdline-tools" -name sdkmanager -type f 2>/dev/null | head -1 || true)"
          if [ -z "$SDKMGR" ]; then SDKMGR="$(command -v sdkmanager || true)"; fi
          echo "sdkmanager: ${SDKMGR:-<not found>}"
          if [ -n "$SDKMGR" ]; then
            yes | "$SDKMGR" --licenses >/dev/null 2>&1 || true
            "$SDKMGR" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          else
            echo "No sdkmanager found; relying on the runner's preinstalled SDK."
          fi
          # Make the SDK location available to the Gradle build step.
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"

      - name: Build debug APK
        working-directory: apps/android-native
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        working-directory: apps/android-native
        run: |
          src=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          cp "$src" "polyglotai-debug.apk"
          ls -la polyglotai-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: polyglotai-debug-apk
          path: apps/android-native/polyglotai-debug.apk
          if-no-files-found: error
          retention-days: 30
