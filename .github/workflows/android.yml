name: Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK (debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.11902837"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - run: pnpm install --frozen-lockfile
      - name: Init Android project
        run: pnpm --filter @polyglotai/desktop-tauri tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837
      - name: Build Android debug APK
        run: pnpm --filter @polyglotai/desktop-tauri tauri android build --debug -v
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837
          # Public by necessity (baked into a client-side bundle) — the proxy itself holds the
          # real OpenAI key server-side, so this URL alone grants no access to anything.
          VITE_AI_PROXY_URL: https://qddglfcuipmazrjoxpin.supabase.co/functions/v1/openai-proxy
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: polyglotai-android-debug-apk
          path: apps/desktop-tauri/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
