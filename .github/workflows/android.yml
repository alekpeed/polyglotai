name: Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK (debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.11902837"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - run: pnpm install --frozen-lockfile
      - name: Build frontend
        # Explicit, rather than relying on Tauri's beforeBuildCommand hook — `tauri android init`
        # turned out to be what actually compiles+copies the frontend (not `tauri android build`,
        # which treats it as already up-to-date), which is undocumented and easy to get wrong.
        run: pnpm --filter @polyglotai/desktop-tauri build
      - name: Init Android project
        # Still needed even though gen/android is committed (see android-bootstrap.yml) — this is
        # what actually copies the built frontend into the Android project. It's file-creating,
        # not file-clobbering: pre-existing customized files (MainActivity.kt, AndroidManifest.xml
        # permissions) are left alone, verified by the compiled-in permission check below.
        run: pnpm --filter @polyglotai/desktop-tauri tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837
      - name: Verify native customizations survived init
        run: |
          if ! grep -q "RECORD_AUDIO" apps/desktop-tauri/src-tauri/gen/android/app/src/main/AndroidManifest.xml; then
            echo "::error::tauri android init clobbered AndroidManifest.xml — mic permission is gone."
            exit 1
          fi
          if ! grep -q "onWebViewCreate" apps/desktop-tauri/src-tauri/gen/android/app/src/main/java/com/polyglotai/desktop/MainActivity.kt; then
            echo "::error::tauri android init clobbered MainActivity.kt — permission-bridging code is gone."
            exit 1
          fi
      - name: Build Android debug APK
        run: pnpm --filter @polyglotai/desktop-tauri tauri android build --debug -v
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837
      - name: Verify AI proxy URL was baked into the build
        run: |
          if ! grep -rq "qddglfcuipmazrjoxpin.supabase.co" apps/desktop-tauri/dist; then
            echo "::error::VITE_AI_PROXY_URL didn't make it into the built bundle — AI Tutor/Conversation/Pronunciation would ship silently disabled."
            exit 1
          fi
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: polyglotai-android-debug-apk
          path: apps/desktop-tauri/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
