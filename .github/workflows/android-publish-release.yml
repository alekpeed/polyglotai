name: Publish Android APK to Release

# Republishes an Android build's APK artifact as a GitHub Release asset. Actions artifacts are
# served from Azure blob storage (blocked in some environments); Release assets come from
# github.com's own CDN, so this makes the APK reliably downloadable. Works for either build:
# the debug workflow (android.yml) or the signed arm64 release workflow (android-release.yml) —
# it just grabs whatever single artifact the run produced.

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of a completed Android build workflow run to publish'
        required: true

permissions:
  contents: write

jobs:
  publish:
    name: Republish APK as a release asset
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p apk-out
          # No --name: download whatever artifact(s) the run produced, so this works for both the
          # debug and the signed-release workflows without hardcoding an artifact name.
          gh run download "${{ inputs.run_id }}" \
            --repo "${{ github.repository }}" \
            --dir apk-out
          find apk-out -type f
      - name: Create release with APK asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="android-${{ inputs.run_id }}"
          mapfile -t apks < <(find apk-out -name '*.apk')
          if [ "${#apks[@]}" -eq 0 ]; then
            echo "::error::no .apk found in the run's artifacts"
            exit 1
          fi
          gh release create "$tag" "${apks[@]}" \
            --repo "${{ github.repository }}" \
            --title "Android APK (run ${{ inputs.run_id }})" \
            --notes "APK for sideloading, built from run ${{ inputs.run_id }}." \
            --prerelease
