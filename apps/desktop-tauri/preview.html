<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://*.supabase.co; img-src 'self' data: blob:; media-src 'self' blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PolyglotAI — web build</title>
    <style>
      /* Deliberately NOT position:fixed — a fixed banner needs its height mirrored as padding
         on #root, and that height isn't constant (this text wraps to 2+ lines on narrow phone
         screens), so a fixed padding-top silently let content render underneath it. Sitting in
         normal document flow instead means #root is always pushed down by however tall the
         banner actually renders, on any screen size, with no magic number to keep in sync. */
      #preview-banner {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 0.6rem 1rem;
        padding: 0.5rem 1rem;
        background: #14181b;
        color: #fafaf7;
        font-family: system-ui, sans-serif;
        font-size: 0.78rem;
        text-align: center;
      }
      #preview-banner button {
        background: none;
        border: 1px solid rgba(250, 250, 247, 0.4);
        color: inherit;
        border-radius: 3px;
        padding: 0.15rem 0.6rem;
        font-size: 0.72rem;
        cursor: pointer;
        flex-shrink: 0;
      }
    </style>
  </head>

  <body>
    <div id="preview-banner">
      <span id="preview-banner-text">Browser build. A real offline app is coming.</span>
      <button id="preview-reset" type="button">Reset local data</button>
    </div>
    <div id="root"></div>
    <script type="module">
      // Accounts builds sync learner data to Supabase, so "stored in this browser only" would be
      // wrong once a build has VITE_SUPABASE_URL/ANON_KEY set — this picks the accurate wording
      // for whichever build actually shipped (see src/auth/supabaseClient.ts for the same check).
      const accountsConfigured = Boolean(
        import.meta.env.VITE_SUPABASE_URL && import.meta.env.VITE_SUPABASE_ANON_KEY,
      );
      document.getElementById("preview-banner-text").textContent = accountsConfigured
        ? "Browser build — sign in and your progress syncs to your account. A real offline app is coming."
        : "Browser build — your progress is stored in this browser only (not synced elsewhere). A real offline app is coming.";

      document.getElementById("preview-reset").addEventListener("click", () => {
        if (!confirm("This clears all progress stored in this browser. Continue?")) return;
        localStorage.removeItem("polyglotai-preview-db-v1");
        location.reload();
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
